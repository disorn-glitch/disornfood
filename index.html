<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ไทย ฟู้ดส์ - Thai Foods Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3a7bd5;
            --secondary: #00d2ff;
            --white: #ffffff;
            --bg: #f0f2f5;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--bg); display: flex; justify-content: center; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }

        .app-container {
            width: 100%; max-width: 500px; height: 100%;
            background: linear-gradient(180deg, #e0f2ff 0%, #ffffff 100%);
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .content-area {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: calc(100px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
        }
        .content-area::-webkit-scrollbar { display: none; }

        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        .app-header { text-align: center; margin-bottom: 30px; }
        .input-group { background: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #eef; }
        .input-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; border: none; outline: none; font-size: 16px; background: transparent; color: #333; }

        .btn-blue {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white; border: none; width: 100%; padding: 16px;
            border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer;
            box-shadow: 0 8px 15px rgba(58, 123, 213, 0.2);
            transition: 0.2s; margin-top: 10px;
        }
        .btn-blue:active { transform: scale(0.98); opacity: 0.9; }

        /* Food Card */
        .food-card {
            background: white; border-radius: 16px; display: flex;
            padding: 12px; margin-bottom: 15px; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .food-info { flex: 1; }
        .add-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 8px 16px; font-weight: bold; cursor: pointer; }

        /* Order Summary Card */
        .order-summary {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 10px;
        }
        .order-item-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }

        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            padding: 12px 10px calc(12px + var(--safe-bottom));
            border-top: 1px solid #eee; z-index: 100;
        }
        .nav-item { font-size: 12px; text-align: center; color: #888; border: none; background: none; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* Admin Styles */
        .table-container { background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="content-area">
        
        <div id="page-login" class="page active">
            <div class="app-header">
                <div style="font-size: 64px; margin-top: 40px;">🍛</div>
                <h1>ไทย ฟู้ดส์</h1>
                <p style="color: #666;">สั่งง่าย จ่ายสะดวก ถึงไว</p>
            </div>
            <div class="input-group">
                <label>ระบุชื่อของคุณ</label>
                <input type="text" id="login-user" placeholder="ตัวอย่าง: คุณสมชาย">
            </div>
            <button class="btn-blue" onclick="handleLogin()">เริ่มสั่งอาหาร</button>
            <div style="height: 50px;"></div>
            <p onclick="navTo('page-admin')" style="text-align:center; font-size:12px; color:#aaa; cursor:pointer;">
                🔒 ระบบจัดการสำหรับร้านค้า
            </p>
        </div>

        <div id="page-menu" class="page">
            <h2 style="color: var(--primary);">เมนูวันนี้</h2>
            <div id="menu-list"></div>
        </div>

        <div id="page-order" class="page">
            <h2 style="color: var(--primary);">🧾 สรุปออเดอร์ของคุณ</h2>
            <div class="order-summary">
                <div id="order-details">
                    </div>
                
                <div class="input-group" style="margin-top:20px; border: 1px solid #ddd;">
                    <label>เลือกวิธีชำระเงิน</label>
                    <select id="pay-method">
                        <option value="เงินสด">💵 เงินสด (ปลายทาง)</option>
                        <option value="โอนผ่านธนาคาร">📱 โอนผ่านธนาคาร (PromptPay)</option>
                    </select>
                </div>

                <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:20px; font-weight:bold;">
                    <span>ยอดรวมทั้งสิ้น:</span>
                    <span id="order-total" style="color:var(--primary);">0 ฿</span>
                </div>
            </div>
            <button class="btn-blue" id="confirm-order-btn" onclick="submitOrderToGoogle()">✅ ยืนยันการสั่งซื้อ</button>
            <button onclick="navTo('page-menu')" style="width:100%; background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">⬅️ กลับไปเลือกเพิ่ม</button>
        </div>

        <div id="page-admin" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">📈 ยอดสั่งซื้อล่าสุด</h3>
                <button onclick="refreshAdminDashboard()" style="background:none; border:none; font-size:18px;">🔄</button>
            </div>
            <div id="stat-container" style="background:var(--primary); color:white; padding:15px; border-radius:12px; margin-bottom:15px;">
                <small>รวมยอดขาย (Real-time)</small>
                <div id="stat-sales" style="font-size:24px; font-weight:bold;">0 ฿</div>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>ลูกค้า</th><th>รายการ</th><th>ยอด</th></tr></thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
            <button onclick="navTo('page-login')" style="width:100%; margin-top:20px; background:none; border:none; color:#888;">ออกจากระบบ</button>
        </div>

    </div>

    <div class="bottom-nav" id="main-nav" style="display:none;">
        <button class="nav-item active" id="nav-home" onclick="navTo('page-menu')">🏠<br>หน้าหลัก</button>
        <button class="nav-item" id="nav-order" onclick="navTo('page-order')">📋<br>ออเดอร์</button>
        <button class="nav-item" onclick="navTo('page-login')">👤<br>บัญชี</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6fwMOGo2OO46jjc3TGNupZPKM4YgnBN2KGjkewkeF3oBtQQZtGYjc7HOuBg-eb2gj/exec";

    const menuData = [
        { name: 'กะเพราไก่ไข่ดาว', price: 60, icon: '🍳' },
        { name: 'ข้าวผัดต้มยำ', price: 75, icon: '🔥' },
        { name: 'ส้มตำไทย', price: 50, icon: '🥗' },
        { name: 'ต้มจืดเต้าหู้', price: 80, icon: '🥣' }
    ];

    let currentCart = []; // เก็บรายการที่เลือก

    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        // จัดการสีปุ่ม Nav
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        if(pageId === 'page-menu') document.getElementById('nav-home').classList.add('active');
        if(pageId === 'page-order') {
            document.getElementById('nav-order').classList.add('active');
            renderOrderSummary();
        }

        const isPublic = ['page-login', 'page-admin'].includes(pageId);
        document.getElementById('main-nav').style.display = isPublic ? 'none' : 'flex';

        if(pageId === 'page-admin') refreshAdminDashboard();
    }

    function handleLogin() {
        const user = document.getElementById('login-user').value;
        if(!user) return alert('กรุณาใส่ชื่อของคุณก่อนครับ');
        renderMenu();
        navTo('page-menu');
    }

    function renderMenu() {
        const menuList = document.getElementById('menu-list');
        menuList.innerHTML = menuData.map(item => `
            <div class="food-card">
                <div style="font-size:24px; margin-right:15px;">${item.icon}</div>
                <div class="food-info">
                    <strong>${item.name}</strong><br>
                    <small style="color:#888;">ราคา ${item.price} บาท</small>
                </div>
                <button class="add-btn" onclick="addToOrder('${item.name}', ${item.price})">เลือก</button>
            </div>
        `).join('');
    }

    function addToOrder(name, price) {
        currentCart.push({ name, price });
        alert(`เพิ่ม ${name} ลงในออเดอร์แล้ว`);
        navTo('page-order'); // เมื่อเลือกแล้วให้เด้งไปหน้าสรุปออเดอร์
    }

    function renderOrderSummary() {
        const details = document.getElementById('order-details');
        const totalElem = document.getElementById('order-total');
        
        if(currentCart.length === 0) {
            details.innerHTML = "<p style='text-align:center; color:#999;'>ยังไม่มีรายการอาหารในออเดอร์</p>";
            totalElem.innerText = "0 ฿";
            return;
        }

        let total = 0;
        details.innerHTML = currentCart.map((item, index) => {
            total += item.price;
            return `
                <div class="order-item-row">
                    <span>${item.name}</span>
                    <span>${item.price} ฿ <button onclick="removeItem(${index})" style="background:none; border:none; color:red; margin-left:10px;">✕</button></span>
                </div>
            `;
        }).join('');
        totalElem.innerText = total.toLocaleString() + " ฿";
    }

    function removeItem(index) {
        currentCart.splice(index, 1);
        renderOrderSummary();
    }

    async function submitOrderToGoogle() {
        if(currentCart.length === 0) return alert('กรุณาเลือกอาหารก่อนยืนยันครับ');
        
        const user = document.getElementById('login-user').value || 'Anonymous';
        const payMethod = document.getElementById('pay-method').value;
        const total = currentCart.reduce((sum, item) => sum + item.price, 0);
        const allItems = currentCart.map(i => i.name).join(', ');

        const data = {
            customer: user,
            items: allItems,
            total: total,
            pay: payMethod
        };

        const btn = document.getElementById('confirm-order-btn');
        btn.innerText = "⏳ กำลังบันทึกออเดอร์...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            
            alert('🎉 สั่งซื้อสำเร็จ! ร้านค้าได้รับออเดอร์ของคุณแล้ว');
            currentCart = []; // ล้างออเดอร์หลังสั่งเสร็จ
            navTo('page-menu');
        } catch (e) {
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
        } finally {
            btn.innerText = "✅ ยืนยันการสั่งซื้อ";
            btn.disabled = false;
        }
    }

    async function refreshAdminDashboard() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">🔄 กำลังดึงข้อมูลล่าสุด...</td></tr>';

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            let totalSales = 0;
            tbody.innerHTML = data.reverse().slice(0, 30).map(row => {
                totalSales += parseFloat(row[3]) || 0;
                return `
                    <tr>
                        <td><strong>${row[1]}</strong><br><small style="color:#999;">${row[4]}</small></td>
                        <td>${row[2]}</td>
                        <td style="color:var(--primary); font-weight:bold;">${row[3]}</td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('stat-sales').innerText = totalSales.toLocaleString() + " ฿";
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">เชื่อมต่อ Sheets ไม่ได้</td></tr>';
        }
    }
</script>

</body>
</html>
